version: '3.9'

# Production compose file.
# Images are pulled from GHCR — set REGISTRY_IMAGE_PREFIX in the shell or .env.production.
# The server's .env.production file supplies all secrets.

services:
  api:
    image: ${REGISTRY_IMAGE_PREFIX:-ghcr.io/kheloge}/kheloge-api:${IMAGE_TAG:-latest}
    restart: unless-stopped
    env_file: .env.production
    environment:
      NODE_ENV: production
      PORT: 4000
    ports:
      - '4000:4000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:4000/health || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - kheloge_net

  web:
    image: ${REGISTRY_IMAGE_PREFIX:-ghcr.io/kheloge}/kheloge-web:${IMAGE_TAG:-latest}
    restart: unless-stopped
    env_file: .env.production
    environment:
      NODE_ENV: production
      PORT: 3035
    ports:
      - '3035:3035'
    depends_on:
      api:
        condition: service_healthy
    networks:
      - kheloge_net

  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    env_file: .env.production
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-kheloge}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-kheloge_prod}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-kheloge}']
      interval: 10s
      timeout: 5s
      retries: 5
    # Not exposed externally — accessible only within the Docker network
    networks:
      - kheloge_net

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kheloge_net

  # Nginx reverse proxy — terminates SSL, serves both API and web
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/conf.d:/etc/nginx/conf.d:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    depends_on:
      - api
      - web
    networks:
      - kheloge_net

volumes:
  postgres_data:
  redis_data:

networks:
  kheloge_net:
    driver: bridge
